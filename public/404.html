<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>归乡小镇</title>
  <!--
    GitHub Pages SPA 404 兜底:刷新非根路径时,GitHub 会展示此 404.html。
    立刻重定向到 /farm-game/(本项目子路径),避免白屏。
    若以后接 vue-router 切到 history 模式,这段可继续兜底。
  -->
  <script>
    // 立即重定向到根,根 index.html 才是 SPA 真正的入口
    var pathSegmentsToKeep = 1; // /farm-game/
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body>
  <p>正在加载归乡小镇...</p>
</body>
</html>
