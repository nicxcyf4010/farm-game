name: Deploy to GitHub Pages

# 触发条件:推送到 main 分支时自动部署
on:
  push:
    branches:
      - main
  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# 避免无关 PR 触发重复部署
concurrency:
  group: pages
  cancel-in-progress: false

# 权限配置:GH Pages 部署需要写入 pages 相关权限
permissions:
  contents: read
  pages: write
  id-token: write

# 防止旧版 Actions runner(Node 12/16)执行失败,显式 pin 到 ubuntu-latest
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        # 备注:vite.config.js 已配 base: '/farm-game/',与 homepage 一致
        #       部署地址:https://nicxcyf4010.github.io/farm-game/
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # vite build 默认输出目录
          path: ./dist

  deploy:
    name: Deploy
    # 必须在 build 完成后且只针对默认分支
    needs: build
    runs-on: ubuntu-latest
    # 只有 main 分支的 push 才部署(workflow_dispatch 也允许手动触发)
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
